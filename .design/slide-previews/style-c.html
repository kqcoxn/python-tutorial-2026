<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预览 C · 8-Bit Orbit 像素轨道</title>
<link href="https://fonts.googleapis.com/css2?family=Tektur:wght@600;800&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
<style>
/* === 预览 C：8-Bit Orbit —— 像素街机 + 深空轨道 + CRT 能量 === */
:root {
  --void: #070a1a;
  --pink: #ff2e88;
  --cyan: #3ee6ff;
  --yellow: #ffd23f;
  --text: #eef1ff;
  --muted: #9aa3c7;
  --cjk: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
.slide {
  position:relative; height:100vh; overflow:hidden;
  background:radial-gradient(70vw 70vh at 78% 30%, #12173a 0%, var(--void) 65%);
  color:var(--text); font-family:"Chakra Petch", var(--cjk);
  display:flex; align-items:center; justify-content:center;
}
/* 像素星野：box-shadow 一次性撒星 */
.stars, .stars2 { position:absolute; width:3px; height:3px; background:var(--cyan); top:0; left:0; }
.stars { box-shadow:8vw 12vh var(--cyan), 15vw 78vh var(--yellow), 24vw 30vh #fff, 32vw 88vh var(--cyan),
  41vw 18vh var(--pink), 52vw 66vh #fff, 58vw 8vh var(--cyan), 66vw 84vh var(--yellow),
  74vw 52vh #fff, 83vw 24vh var(--cyan), 90vw 70vh var(--pink), 6vw 55vh #fff,
  46vw 42vh var(--yellow), 95vw 40vh var(--cyan);
  animation:twinkle 2.6s steps(2) infinite; }
.stars2 { width:2px; height:2px; box-shadow:12vw 40vh #fff, 28vw 60vh var(--cyan), 38vw 8vh #fff,
  49vw 90vh var(--pink), 61vw 34vh #fff, 71vw 12vh var(--yellow), 80vw 88vh #fff,
  88vw 6vh var(--cyan), 18vw 90vh #fff, 35vw 48vh var(--cyan);
  animation:twinkle 3.4s steps(2) .8s infinite; }
@keyframes twinkle { 50% { opacity:.25; } }
/* CRT 扫描线 */
.crt { position:absolute; inset:0; pointer-events:none; z-index:6;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, transparent 2px 5px); opacity:.45; }

/* 像素轨道装饰：右上角旋转的卫星 */
.orbit { position:absolute; right:9vw; top:12vh; width:22vmin; height:22vmin;
  border:3px dashed rgba(62,230,255,.35); border-radius:50%;
  animation:spin 14s linear infinite; }
.orbit i { position:absolute; top:-8px; left:calc(50% - 8px); width:16px; height:16px;
  background:var(--yellow); box-shadow:0 0 12px var(--yellow); }
@keyframes spin { to { transform:rotate(360deg); } }
/* 像素火星（大号方块堆出来的星球） */
.mars { position:absolute; right:14.2vw; top:calc(12vh + 7vmin); width:8vmin; height:8vmin;
  background:var(--pink); border-radius:14%;
  box-shadow:0 0 0 1.2vmin rgba(255,46,136,.25), 0 0 34px rgba(255,46,136,.65); }

/* 主面板：像素角括号 */
.panel { position:relative; padding:5vh 4.5vw; z-index:2; }
.panel::before, .panel::after,
.corners::before, .corners::after { content:""; position:absolute; width:26px; height:26px; }
.panel::before { top:0; left:0; border-top:6px solid var(--cyan); border-left:6px solid var(--cyan); }
.panel::after { top:0; right:0; border-top:6px solid var(--cyan); border-right:6px solid var(--cyan); }
.corners::before { bottom:0; left:0; border-bottom:6px solid var(--cyan); border-left:6px solid var(--cyan); }
.corners::after { bottom:0; right:0; border-bottom:6px solid var(--cyan); border-right:6px solid var(--cyan); }
.corners { position:absolute; inset:0; pointer-events:none; }

.eyebrow { font-family:"Tektur",var(--cjk); font-weight:600; color:var(--yellow);
  letter-spacing:.3em; font-size:clamp(12px,1.1vw,16px); text-transform:uppercase;
  animation:fadeUp .7s .15s both; }
h1 { font-family:"Tektur",var(--cjk); font-weight:800; margin-top:2vh;
  font-size:clamp(32px,4.8vw,74px); line-height:1.1;
  text-shadow:4px 4px 0 rgba(255,46,136,.85);
  animation:fadeUp .7s .35s both; }
h1 span { color:var(--cyan); text-shadow:4px 4px 0 rgba(255,46,136,.85); }
.sub { margin-top:2.6vh; color:var(--muted); font-size:clamp(14px,1.3vw,20px);
  animation:fadeUp .7s .55s both; }

/* 像素按钮风代码芯片 */
.chip { margin-top:4.5vh; display:inline-block; padding:1.8vh 2vw;
  font-family:"Chakra Petch",monospace; font-size:clamp(14px,1.35vw,21px); color:var(--void);
  background:var(--yellow); font-weight:600;
  box-shadow:6px 6px 0 var(--pink);
  animation:popIn .5s .9s cubic-bezier(.2,1.4,.4,1) both; }
@keyframes popIn { from{opacity:0; transform:scale(.8)} to{opacity:1; transform:scale(1)} }
@keyframes fadeUp { from{opacity:0; transform:translateY(24px)} to{opacity:1; transform:none} }
@media (prefers-reduced-motion: reduce) { *{animation:none !important} }
</style>
</head>
<body>
<section class="slide">
  <div class="stars"></div><div class="stars2"></div>
  <div class="orbit"><i></i></div>
  <div class="mars"></div>
  <div class="crt"></div>
  <div class="panel">
    <div class="corners"></div>
    <div class="eyebrow">Python 基础 · Stage 01</div>
    <h1>环境、Python<br>与<span>第一个程序</span></h1>
    <p class="sub">按下运行键的那一刻，你就是火星基地的任务控制员。</p>
    <div class="chip">&gt; print("Hello, Python!")</div>
  </div>
</section>
</body>
</html>
