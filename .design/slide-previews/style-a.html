<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预览 A · Neon Cyber 深空任务控制台</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
/* === 预览 A：Neon Cyber —— 深空 + 霓虹 + 网格，任务控制台基调 === */
:root {
  --bg: #0a0f1c;
  --cyan: #00ffcc;
  --magenta: #ff00aa;
  --text: #eaf2ff;
  --muted: #8b9bb8;
  --cjk: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
.slide {
  position:relative; height:100vh; overflow:hidden;
  background:
    radial-gradient(60vw 60vh at 12% 8%, rgba(0,255,204,.12), transparent 60%),
    radial-gradient(55vw 55vh at 88% 92%, rgba(255,0,170,.10), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:"Satoshi", var(--cjk);
  display:flex; align-items:center; justify-content:center;
}
/* 网格地面 */
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,255,204,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,204,.05) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(80vw 80vh at 50% 45%, #000 30%, transparent 100%);
}
/* 漂浮粒子 */
.p { position:absolute; width:4px; height:4px; border-radius:50%; background:var(--cyan); opacity:.6;
     animation:float 7s ease-in-out infinite; box-shadow:0 0 8px var(--cyan); }
.p:nth-child(1){left:12%;top:22%;animation-delay:0s}
.p:nth-child(2){left:22%;top:68%;animation-delay:1.2s;background:var(--magenta);box-shadow:0 0 8px var(--magenta)}
.p:nth-child(3){left:78%;top:18%;animation-delay:.6s}
.p:nth-child(4){left:88%;top:58%;animation-delay:2s}
.p:nth-child(5){left:60%;top:82%;animation-delay:.9s;background:var(--magenta);box-shadow:0 0 8px var(--magenta)}
.p:nth-child(6){left:38%;top:12%;animation-delay:1.6s}
.p:nth-child(7){left:5%;top:48%;animation-delay:2.4s}
.p:nth-child(8){left:70%;top:40%;animation-delay:.3s}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

/* 顶部任务栏 */
.hud { position:absolute; top:4.5vh; left:6vw; right:6vw; display:flex; justify-content:space-between;
  font-size:clamp(11px,1vw,14px); letter-spacing:.25em; color:var(--cyan); text-transform:uppercase;
  animation:fadeDown .8s .2s cubic-bezier(.2,.7,.2,1) both; }
.hud .dots span { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:8px;
  background:rgba(139,155,184,.35); }
.hud .dots span.on { background:var(--cyan); box-shadow:0 0 10px var(--cyan); }

/* 幽灵章节号 */
.ghost { position:absolute; right:4vw; top:8vh; font-family:"Clash Display",var(--cjk); font-weight:700;
  font-size:clamp(160px,26vw,380px); line-height:1; color:transparent;
  -webkit-text-stroke:1px rgba(0,255,204,.18); user-select:none;
  animation:fadeIn 1.4s .4s both; }

/* 主内容 */
.main { position:relative; max-width:min(72vw, 1000px); animation:fadeUp .9s .5s cubic-bezier(.2,.7,.2,1) both; }
.eyebrow { font-size:clamp(12px,1.1vw,16px); letter-spacing:.35em; color:var(--magenta);
  text-transform:uppercase; margin-bottom:2.2vh; text-shadow:0 0 14px rgba(255,0,170,.6); }
h1 { font-family:"Clash Display",var(--cjk); font-weight:700;
  font-size:clamp(34px,4.6vw,72px); line-height:1.12;
  text-shadow:0 0 30px rgba(0,255,204,.35); }
h1 em { font-style:normal; color:var(--cyan); }
.sub { margin-top:2.4vh; font-size:clamp(15px,1.4vw,21px); color:var(--muted); }

/* 代码芯片 */
.chip { margin-top:4.5vh; display:inline-flex; align-items:center; gap:14px;
  padding:1.6vh 1.8vw; border:1px solid rgba(0,255,204,.35); border-radius:10px;
  background:rgba(10,15,28,.75); box-shadow:0 0 24px rgba(0,255,204,.18), inset 0 0 18px rgba(0,255,204,.05);
  font-family:"JetBrains Mono","SFMono-Regular",Consolas,monospace;
  font-size:clamp(14px,1.3vw,20px); animation:fadeUp .9s 1s cubic-bezier(.2,.7,.2,1) both; }
.chip .tag { color:var(--magenta); }
.chip code { color:var(--cyan); }

@keyframes fadeUp { from{opacity:0; transform:translateY(26px)} to{opacity:1; transform:none} }
@keyframes fadeDown { from{opacity:0; transform:translateY(-16px)} to{opacity:1; transform:none} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@media (prefers-reduced-motion: reduce) { *{animation:none !important} }
</style>
</head>
<body>
<section class="slide">
  <div class="grid"></div>
  <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
  <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
  <div class="hud">
    <span>Mission Log · Sol 01</span>
    <span class="dots"><span class="on"></span><span></span><span></span></span>
  </div>
  <div class="ghost">01</div>
  <div class="main">
    <div class="eyebrow">Python 基础 · Chapter 01</div>
    <h1>环境、Python<br>与<em>第一个程序</em></h1>
    <p class="sub">找到代码文件 → 输入 → 运行 → 看到输出。今天，完成你的第一次点火。</p>
    <div class="chip"><span class="tag">&gt;&gt;&gt;</span><code>print("Hello, Python!")</code></div>
  </div>
</section>
</body>
</html>
