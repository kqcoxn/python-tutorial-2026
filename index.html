/* === SECTION: 风格 S 设计令牌（与 docs/slide-design-system.md §3 一致） === */
:root {
  --s-bg: #FAFAF8;
  --s-ink: #0A0A0A;
  --s-accent: #FF6B35;
  --s-muted: #6B6B66;
  --s-hairline: rgba(10,10,10,.14);
  --font-latin: "Archivo", "Helvetica Neue", sans-serif;
  --font-serif-cjk: "Songti SC","STSong","SimSun","Noto Serif CJK SC",serif;
  --font-sans-cjk: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  background: var(--s-bg);
  color: var(--s-ink);
  font-family: var(--font-sans-cjk);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  /* 签名元素：可见细网格（发丝线，低对比） */
  background-image:
    linear-gradient(to right, var(--s-hairline) 1px, transparent 1px),
    linear-gradient(to bottom, var(--s-hairline) 1px, transparent 1px);
  background-size: 8.333vw 8.333vw;
  background-position: -1px -1px;
}

/* === SECTION: 十字对位标记（四角） === */
.cross {
  position: fixed;
  font-family: var(--font-latin);
  font-weight: 400;
  font-size: clamp(14px, 1.4vw, 22px);
  color: var(--s-muted);
  opacity: .55;
  user-select: none;
  pointer-events: none;
  line-height: 1;
}
.cross.tl { top: clamp(10px, 2vh, 22px); left: clamp(12px, 2vw, 26px); }
.cross.tr { top: clamp(10px, 2vh, 22px); right: clamp(12px, 2vw, 26px); }
.cross.bl { bottom: clamp(10px, 2vh, 22px); left: clamp(12px, 2vw, 26px); }
.cross.br { bottom: clamp(10px, 2vh, 22px); right: clamp(12px, 2vw, 26px); }

/* === SECTION: 页眉 === */
header {
  padding: clamp(20px, 4.5vh, 48px) clamp(28px, 5vw, 72px) 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: clamp(16px, 3vw, 48px);
  flex-wrap: wrap;
}

.eyebrow {
  font-family: var(--font-latin);
  font-weight: 800;
  font-size: clamp(10px, .95vw, 14px);
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--s-accent);
  margin-bottom: clamp(6px, 1.2vh, 14px);
}

h1 {
  font-family: var(--font-latin), var(--font-serif-cjk);
  font-weight: 700;
  font-size: clamp(34px, 4.6vw, 64px);
  line-height: 1.1;
  letter-spacing: .02em;
}

h1 .en {
  display: block;
  font-family: var(--font-latin);
  font-weight: 800;
  font-size: clamp(12px, 1.1vw, 16px);
  letter-spacing: .3em;
  color: var(--s-muted);
  margin-top: clamp(6px, 1.4vh, 14px);
  text-transform: uppercase;
}

.meta {
  text-align: right;
  font-family: var(--font-latin), var(--font-sans-cjk);
  color: var(--s-muted);
  font-size: clamp(12px, 1.15vw, 16px);
  line-height: 1.8;
  padding-bottom: clamp(2px, .6vh, 8px);
}
.meta strong {
  font-family: var(--font-latin);
  font-weight: 800;
  color: var(--s-ink);
  font-size: 1.25em;
}

/* 签名元素：橙色粗规矩形分隔线 */
.rule {
  margin: clamp(14px, 2.8vh, 30px) clamp(28px, 5vw, 72px) 0;
  height: clamp(4px, .7vh, 7px);
  background: var(--s-accent);
  width: clamp(120px, 18vw, 260px);
}

/* === SECTION: 章节卡片网格 === */
main {
  flex: 1;
  padding: clamp(18px, 3.6vh, 40px) clamp(28px, 5vw, 72px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(10px, 1.4vw, 20px);
  align-content: start;
}

.card {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: clamp(6px, 1.2vh, 12px);
  padding: clamp(12px, 1.6vw, 22px);
  min-height: clamp(120px, 21vh, 190px);
  background: #fff;
  border: 1px solid var(--s-hairline);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  /* 入场 staggered fade-up */
  opacity: 0;
  animation: fadeUp .5s ease forwards;
  animation-delay: calc(var(--i) * 45ms);
}
.card::before {
  /* 悬停时顶部橙色粗线 */
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: clamp(3px, .5vh, 5px);
  background: var(--s-accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .22s ease;
}
.card:hover, .card:focus-visible {
  transform: translateY(-3px);
  border-color: var(--s-ink);
  box-shadow: 6px 6px 0 rgba(10,10,10,.12);
}
.card:hover::before, .card:focus-visible::before { transform: scaleX(1); }
.card:focus-visible { outline: 2px solid var(--s-accent); outline-offset: 2px; }

/* 幽灵大数字（描边浅灰，风格 S 签名元素） */
.ghost {
  position: absolute;
  right: clamp(4px, .8vw, 12px);
  top: clamp(-8px, -1vh, -2px);
  font-family: var(--font-latin);
  font-weight: 800;
  font-size: clamp(56px, 6.4vw, 104px);
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(10,10,10,.16);
  user-select: none;
  transition: color .18s ease;
}
.card:hover .ghost { color: rgba(255,107,53,.16); -webkit-text-stroke-color: var(--s-accent); }

.ch-label {
  font-family: var(--font-latin), var(--font-sans-cjk);
  font-size: clamp(11px, 1vw, 14px);
  font-weight: 500;
  letter-spacing: .18em;
  color: var(--s-muted);
}
.ch-label b { font-family: var(--font-latin); font-weight: 800; color: var(--s-accent); }

.ch-title {
  font-family: var(--font-serif-cjk);
  font-weight: 700;
  font-size: clamp(16px, 1.55vw, 24px);
  line-height: 1.35;
  position: relative;
  z-index: 1;
}

.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--s-hairline);
  padding-top: clamp(6px, 1vh, 10px);
  font-family: var(--font-latin), var(--font-sans-cjk);
  font-size: clamp(11px, .95vw, 13px);
  color: var(--s-muted);
}
.pages { letter-spacing: .08em; }
.key {
  font-family: var(--font-latin);
  font-weight: 800;
  border: 1px solid var(--s-hairline);
  padding: .05em .5em .12em;
  font-size: .95em;
  color: var(--s-ink);
  background: var(--s-bg);
}
.arrow { font-family: var(--font-latin); font-weight: 800; color: var(--s-accent); }

/* === SECTION: 页脚操作提示 === */
footer {
  padding: 0 clamp(28px, 5vw, 72px) clamp(16px, 3.2vh, 36px);
  font-size: clamp(11px, 1vw, 14px);
  color: var(--s-muted);
  display: flex;
  justify-content: space-between;
  gap: 1em;
  flex-wrap: wrap;
  line-height: 1.9;
}
footer kbd {
  font-family: var(--font-latin);
  font-weight: 800;
  font-size: .92em;
  color: var(--s-ink);
  border: 1px solid var(--s-hairline);
  background: #fff;
  padding: .05em .45em .12em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 矮屏 / 窄屏适配 */
@media (max-width: 900px) { main { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 640px) { main { grid-template-columns: repeat(2, 1fr); } }
@media (max-height: 700px) {
  header { padding-top: clamp(14px, 3vh, 24px); }
  .card { min-height: clamp(100px, 19vh, 150px); }
}

@media (prefers-reduced-motion: reduce) {
  .card { animation: none; opacity: 1; }
  .card, .card::before, .ghost { transition: none; }
}
</style>
</head>
<body>

<span class="cross tl">+</span><span class="cross tr">+</span>
<span class="cross bl">+</span><span class="cross br">+</span>

<header>
  <div>
    <div class="eyebrow">Python 基础与 AI 编程实践 · 第一阶段</div>
    <h1>课程导航<span class="en">Course Navigator</span></h1>
  </div>
  <div class="meta">
    <div><strong>11</strong> 章课件 · 共 <strong>246</strong> 页</div>
    <div>按数字键 <strong>0–9、10</strong> 快速跳转</div>
  </div>
</header>

<div class="rule"></div>

<main id="grid"></main>

<footer>
  <div>点击卡片或按数字键跳转（新标签页打开）；第 10 章按 <kbd>1</kbd> 再按 <kbd>0</kbd></div>
  <div>课件内：<kbd>←</kbd><kbd>→</kbd> 翻页 · <kbd>E</kbd> 编辑 · Pages 侧栏跳页 · 激光笔在左上角</div>
</footer>

<script>
/* === SECTION: 章节清单（与 lessons/ 目录一一对应） === */
const CHAPTERS = [
  { n: 0,  title: "课程导入",                    dir: "00-course-intro",               pages: 13 },
  { n: 1,  title: "环境、Python 与第一个程序",   dir: "01-environment-first-program",  pages: 20 },
  { n: 2,  title: "输出、注释与基础 Debug",      dir: "02-output-comments-debug",      pages: 22 },
  { n: 3,  title: "变量、标识符与基本类型",      dir: "03-variables-identifiers",      pages: 21 },
  { n: 4,  title: "字符串、格式化输出与转义字符", dir: "04-strings-formatting",         pages: 22 },
  { n: 5,  title: "输入、类型转换与运算符",      dir: "05-input-operators",            pages: 25 },
  { n: 6,  title: "布尔值、比较与逻辑运算",      dir: "06-boolean-logic",              pages: 24 },
  { n: 7,  title: "条件分支",                    dir: "07-conditions",                 pages: 29 },
  { n: 8,  title: "while 循环与循环嵌套",        dir: "08-while-loops",                pages: 23 },
  { n: 9,  title: "for 循环与 break、continue",  dir: "09-for-break-continue",         pages: 28 },
  { n: 10, title: "综合作业、自由完善与展示",    dir: "10-integrated-assignment",      pages: 19 },
];

/* === SECTION: 渲染卡片 === */
const grid = document.getElementById("grid");
CHAPTERS.forEach((c, i) => {
  const a = document.createElement("a");
  a.className = "card";
  a.href = `lessons/${c.dir}/slides.html`;
  a.target = "_blank";
  a.rel = "noopener";
  a.style.setProperty("--i", i);
  a.innerHTML = `
    <span class="ghost">${String(c.n).padStart(2, "0")}</span>
    <div>
      <div class="ch-label">CHAPTER <b>${String(c.n).padStart(2, "0")}</b></div>
      <div class="ch-title">${c.title}</div>
    </div>
    <div class="card-foot">
      <span class="pages">${c.pages} 页</span>
      <span><span class="key">${c.n}</span> <span class="arrow">→</span></span>
    </div>`;
  grid.appendChild(a);
});

/* === SECTION: 键盘快速跳转（0–9 直跳；1 后接 0 = 第 10 章） === */
let pendingOne = false, timer = null;
document.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (!/^[0-9]$/.test(e.key)) return;
  if (pendingOne) {
    clearTimeout(timer);
    pendingOne = false;
    if (e.key === "0") { open(10); return; }
  }
  if (e.key === "1") {
    pendingOne = true;
    timer = setTimeout(() => { pendingOne = false; open(1); }, 600);
    return;
  }
  open(Number(e.key));
});
function open(n) {
  const c = CHAPTERS.find(c => c.n === n);
  if (c) window.open(`lessons/${c.dir}/slides.html`, "_blank", "noopener");
}
</script>

</body>
</html>
